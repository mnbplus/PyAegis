# PyAegis default rule set
#
# This file is intentionally structured to support both:
#   - Simple flat lists (inputs/sinks/sanitizers) for basic matching
#   - Structured conditional_sinks for reduced false positives (P2)
#   - source_decorators for framework-aware taint entry-points (P1)
#
# Glob patterns (fnmatch) supported in inputs/sinks, e.g. subprocess.*
#
# conditional_sinks: structured sink definitions with optional conditions.
#   conditions.has_kwarg  : only trigger when call has a specific kwarg=value
#   conditions.not_in_test_file: skip if file path looks like a test file
#   conditions.arg_type: only trigger when the primary call argument looks like that type
#     - string: string literal / f-string / string operation (containers like list/tuple excluded)

# Optional: inter-procedural analysis depth when a global symbol table is available.
# Higher values can catch longer cross-module chains but may increase runtime.
max_call_depth: 3

# ── Unconditional sinks (keep for backward compat + glob matching) ──────────
sinks:
  # Code execution
  - eval
  - exec
  - compile
  - builtins.eval
  - builtins.exec
  - runpy.run_module
  - runpy.run_path

  # OS command execution (conditional versions below override these)
  - os.system
  - os.popen
  - os.spawn*
  - commands.getoutput

  # Template injection / dangerous rendering
  - jinja2.Template
  - jinja2.Environment.from_string
  - mako.template.Template

  # Deserialization (conditional versions below handle test-file skip)
  - cPickle.loads
  - dill.loads
  - marshal.loads
  - yaml.load
  - yaml.unsafe_load
  - ruamel.yaml.load
  - jsonpickle.decode

  # SSRF / URL fetch
  - urllib.request.urlopen
  - urllib3.PoolManager.request
  - urllib3.request
  - requests.get
  - requests.post
  - requests.request
  - httpx.get
  - httpx.post
  - httpx.request
  - aiohttp.ClientSession.get
  - aiohttp.ClientSession.post
  - aiohttp.ClientSession.request
  - socket.create_connection

  # Path traversal / file ops
  - open
  - builtins.open
  - os.open
  - os.remove
  - os.unlink
  - os.rmdir
  - os.rename
  - os.replace
  - os.mkdir
  - os.makedirs
  - shutil.copy
  - shutil.copyfile
  - shutil.copytree
  - shutil.move
  - shutil.rmtree
  - pathlib.Path
  - pathlib.Path.open
  - pathlib.Path.write_text
  - pathlib.Path.write_bytes
  - tempfile.NamedTemporaryFile

  # SQL injection
  - sqlite3.connect
  - sqlite3.Connection.execute
  - sqlite3.Cursor.execute
  - sqlite3.Cursor.executemany
  - psycopg2.connect
  - psycopg2.cursor.execute
  - MySQLdb.connect
  - pymysql.connect
  - sqlalchemy.text

  # Django ORM raw SQL (P1)
  # `.raw()` executes raw SQL; `.filter()` is parameterized and should not be flagged.
  - '*.objects.raw'
  - '*.raw'

  # XXE / XML
  - xml.etree.ElementTree.parse
  - xml.etree.ElementTree.fromstring
  - lxml.etree.parse
  - lxml.etree.fromstring
  - xml.dom.minidom.parse
  - xml.dom.minidom.parseString

  # Regex DoS
  - re.compile
  - re.match
  - re.search

# ── Conditional sinks (P2: reduce false positives) ──────────────────────────
# These sinks are ONLY reported when their conditions are satisfied.
# A conditional sink listed here SHADOWS the matching unconditional entry above.
conditional_sinks:
  # subprocess.run(cmd, shell=False) is SAFE — only flag shell=True
  # Additionally, only flag when the primary arg is string-like.
  # This avoids false positives for `subprocess.run(['ls', '-la'], shell=True)`.
  - name: subprocess.run
    severity: CRITICAL
    rule_id: PYA-001
    vuln_type: command_injection
    conditions:
      - has_kwarg: {shell: true}
      - arg_type: string

  # subprocess.call with shell=True only
  - name: subprocess.call
    severity: CRITICAL
    rule_id: PYA-001
    vuln_type: command_injection
    conditions:
      - has_kwarg:
          shell: true

  # subprocess.Popen with shell=True only
  - name: subprocess.Popen
    severity: CRITICAL
    rule_id: PYA-001
    vuln_type: command_injection
    conditions:
      - has_kwarg:
          shell: true

  # subprocess.* glob — shell=True only
  - name: subprocess.*
    severity: CRITICAL
    rule_id: PYA-001
    vuln_type: command_injection
    conditions:
      - has_kwarg:
          shell: true

  # pickle.loads / pickle.load: ignore in test files
  - name: pickle.loads
    severity: HIGH
    rule_id: PYA-004
    vuln_type: deserialization
    conditions:
      - not_in_test_file: true

  - name: pickle.load
    severity: HIGH
    rule_id: PYA-004
    vuln_type: deserialization
    conditions:
      - not_in_test_file: true

# ── Inputs (untrusted sources) ───────────────────────────────────────────────
inputs:
  # Builtins / env / cli
  - input
  - sys.argv
  - os.getenv
  - os.environ.get
  - environ.get

  # Flask / Werkzeug request
  - flask.request
  - request
  - request.args
  - request.form
  - request.values
  - request.data
  - request.json
  - request.get_json
  - request.headers
  - request.cookies
  - request.files
  - request.view_args
  - request.get_data

  # Django HttpRequest
  - django.http.request.HttpRequest
  - request.GET
  - request.POST
  - request.COOKIES
  - request.FILES
  - request.headers
  - request.body
  - request.META

  # FastAPI / Starlette Request
  - starlette.requests.Request
  - fastapi.Request
  - request.query_params
  - request.path_params
  - request.headers
  - request.cookies
  - request.state
  - request.json
  - request.form
  - request.body

  # Web frameworks (generic)
  - web.input
  - cgi.FieldStorage

  # Common libraries / parsing
  - json.loads
  - ujson.loads
  - orjson.loads

  # XML from user-controlled strings
  - xmltodict.parse

# ── Source decorators (P1: framework-aware source detection) ─────────────────
# Functions decorated with these are treated as taint entry-points.
# All their parameters are automatically marked as tainted Sources (depth=1).
source_decorators:
  # Flask
  - app.route
  - app.get
  - app.post
  - app.put
  - app.delete
  - app.patch
  - app.options
  - app.head
  # FastAPI / APIRouter
  - router.get
  - router.post
  - router.put
  - router.delete
  - router.patch
  - router.options
  - router.head
  - router.route
  # Generic web framework patterns
  - bp.route
  - bp.get
  - bp.post
  - bp.put
  - bp.delete
  - bp.patch

# ── Sanitizers ───────────────────────────────────────────────────────────────
sanitizers:
  # HTML / XSS
  - html.escape
  - markupsafe.escape
  - bleach.clean
  - django.utils.html.escape
  - flask.escape
  - xml.sax.saxutils.escape

  # Path traversal hardening
  - os.path.abspath
  - os.path.normpath
  - pathlib.Path.resolve

  # SQL parameterization helpers (heuristic)
  - sqlite3.Connection.execute
  - sqlite3.Cursor.execute

  # URL validation (heuristic)
  - urllib.parse.urlparse
  - validators.url
